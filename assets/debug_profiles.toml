# Debug-UI game profile registry (Phase 5 / 20 of the debug-UI plan).
#
# Each [profiles.<key>] block describes one game install the
# `--game <key>` CLI expander and the debug UI's Loader panel can
# target. The shipped file uses the `subdir` field to defer the
# absolute root: at runtime the binary joins
# `<--games-root | $BYROREDUX_GAMES_ROOT | /mnt/data/SteamLibrary/steamapps/common>`
# with `subdir` to produce the actual data directory. Override with
# an explicit `root = "/abs/path"` in `~/.byroredux/profiles.toml`
# for a non-Steam / non-default-prefix install.
#
# Schema:
#   name                  Display name shown in the Loader dropdown.
#   subdir                Game folder under the shared games root
#                         (e.g. "Fallout 4/Data"). Empty when
#                         `root` carries the absolute path instead.
#   root                  Absolute override; takes priority over
#                         `subdir`. Default empty so the shared root
#                         drives every entry.
#   esm                   Main ESM filename inside the data dir.
#   default_bsas          Mesh BSA / BA2 archives.
#   default_textures_bsas Texture archives.
#   default_materials_bsas
#                         BGSM/BGEM materials archives (FO4+/FO76/SF
#                         only; empty for Skyrim and older).
#   sample_cells          Curated cell editor IDs for one-click loads.
#
# Optional [defaults] table ŌĆö launch defaults applied when the engine
# is run with no CLI load flags. Left unset in the shipped file so a
# bare `cargo run` keeps the spinning-cube demo; set it in your
# `~/.byroredux/profiles.toml` to boot straight into a game/cell:
#
#   [defaults]
#   game             = "fnv"                       # profile key; used when no --game/--esm/--mesh/--cmd
#   cell             = "GSProspectorSaloonInterior" # used when no --cell/--grid/--wrld
#   games_root       = "/path/to/games"            # like --games-root / BYROREDUX_GAMES_ROOT
#   light_atten_knee = 0.5                          # REND-#1451 attenuation knee (see `light.atten`)
#   light_atten_legacy = false

[profiles.fnv]
name = "Fallout New Vegas"
subdir = "Fallout New Vegas/Data"
root = ""
esm = "FalloutNV.esm"
default_bsas = ["Fallout - Meshes.bsa"]
default_textures_bsas = ["Fallout - Textures.bsa"]
default_materials_bsas = []
# F6 (2026-05-26) ŌĆö all entries verified via
# `cargo run -p byroredux-plugin --example probe_cells`. Pre-fix
# the list contained `Goodsprings` (worldspace, not an interior cell)
# and `NVDLC04Big01` (no match in vanilla; either DLC-only or
# misspelled). Both caused the cell-load to silently fall through
# to the empty-default scene with 6 entities.
sample_cells = [
    "GSDocMitchellHouse",
    "GSProspectorSaloonInterior",
    "SLGoodspringsCaveINT",
]

