# Debug-UI game profile registry (Phase 5 of the debug-UI plan).
#
# Each [profiles.<key>] block describes one game install the debug UI
# can target. The default file ships zero-rooted entries — every
# operator's install path is different, so the canonical
# "ready-to-use" location for filled-in paths is
# `~/.byroredux/profiles.toml`, which overrides this file when
# present.
#
# Schema:
#   name                 Display name shown in the Loader dropdown.
#   root                 Absolute path to the game's data directory
#                        (the directory holding the ESMs). Use `~` for
#                        home — the loader resolves it.
#   esm                  Main ESM filename inside `root`.
#   default_bsas         Mesh BSA / BA2 archive filenames (relative
#                        to `root`).
#   default_textures_bsas
#                        Texture archive filenames.
#   sample_cells         Curated cell editor IDs the UI offers as
#                        one-click loads.

[profiles.fnv]
name = "Fallout New Vegas"
root = ""
esm = "FalloutNV.esm"
default_bsas = ["Fallout - Meshes.bsa"]
default_textures_bsas = ["Fallout - Textures.bsa"]
sample_cells = [
    "GSDocMitchellHouse",
    "Goodsprings",
    "NVDLC04Big01",
]

